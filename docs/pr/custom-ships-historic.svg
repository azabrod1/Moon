<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#100d08"/><stop offset="1" stop-color="#251b10"/></linearGradient><linearGradient id="card" y2="1"><stop stop-color="#30271b"/><stop offset="1" stop-color="#17120c"/></linearGradient><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.eyebrow{font:600 14px ui-monospace,SFMono-Regular,monospace;letter-spacing:3px;fill:#e5b96f}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#faf7f0}.sub{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#b6a68e}.name{font:650 24px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fbf7ef}.note{font:500 13px ui-monospace,SFMono-Regular,monospace;letter-spacing:1px;fill:#bda37d}.card{fill:url(#card);stroke:#59472f}.ship{fill:#f0d39c;fill-opacity:.13;stroke:#ffe0a6;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}</style>
    <symbol id="apollo" viewBox="0 0 40 30"><path d="M36 15 L25 8 H21 V22 H25 Z M21 10 H8 V20 H21 Z M8 12 L3 15 L8 18"/><path d="M12 10 V20 M17 10 V20 M25 10 V20 M29 11 V19 M36 15 H39"/></symbol>
    <symbol id="shuttle" viewBox="0 0 40 30"><path d="M36 15 Q33 11 28 10 L23 10 L13 4 H9 L16 11 H9 L5 15 L9 19 H16 L9 26 H13 L23 20 H28 Q33 19 36 15 Z"/><path d="M12 11 L8 6 H5 L7 15 L5 24 H8 L12 19 M24 11 V19 M31 13 V17"/></symbol>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/><circle cx="1050" cy="35" r="220" fill="#725525" opacity=".12"/>
  <text class="eyebrow" x="40" y="42">CHOOSE SHIP · HISTORIC</text><text class="title" x="40" y="82">Milestones of crewed spaceflight</text><text class="sub" x="40" y="108">The command-and-service stack and the orbital glider.</text>
  <g transform="translate(40 180)"><rect class="card" width="540" height="820" rx="16"/><use class="ship" href="#apollo" x="95" y="150" width="350" height="280"/><text class="name" x="36" y="680">Apollo</text><text class="note" x="36" y="720">LUNAR COMMAND SHIP</text></g>
  <g transform="translate(620 180)"><rect class="card" width="540" height="820" rx="16"/><use class="ship" href="#shuttle" x="95" y="150" width="350" height="280"/><text class="name" x="36" y="680">Space Shuttle</text><text class="note" x="36" y="720">ORBITAL GLIDER</text></g>
</svg>
