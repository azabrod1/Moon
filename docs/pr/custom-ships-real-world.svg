<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b12"/>
      <stop offset="1" stop-color="#101a25"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#172432"/>
      <stop offset="1" stop-color="#0c131d"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .eyebrow{font:600 14px ui-monospace,SFMono-Regular,monospace;letter-spacing:3px;fill:#78b9d9}
      .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f2f7fa}
      .sub{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#8fa5b4}
      .name{font:650 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#edf7fb}
      .note{font:500 13px ui-monospace,SFMono-Regular,monospace;letter-spacing:1px;fill:#7e9aaa}
      .ship{fill:#9ec9d9;fill-opacity:.13;stroke:#b9eaff;stroke-width:1.35;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}
      .card{fill:url(#card);stroke:#293b4b;stroke-width:1}
    </style>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <circle cx="1020" cy="80" r="220" fill="#153850" opacity=".13"/>
  <text class="eyebrow" x="42" y="42">CHOOSE SHIP · REAL-WORLD LINEAGE</text>
  <text class="title" x="42" y="82">Spaceflight icons, rebuilt for the chase camera</text>
  <text class="sub" x="42" y="108">Source-derived selector silhouettes from the custom-ships feature.</text>

  <g transform="translate(40 140)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M34 15 L24 9 L20 9 L20 21 L24 21 Z M20 11 H8 V19 H20"/><path d="M8 15 H3 M12 11 V19 M27 11 V19"/>
    </g>
    <text class="name" x="24" y="365">Apollo</text><text class="note" x="24" y="397">LUNAR COMMAND SHIP</text>
  </g>
  <g transform="translate(420 140)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M35 15 L27 10 L10 10 L5 15 L10 20 L27 20 Z"/><path d="M24 10 L12 3 L9 4 L16 10 M24 20 L12 27 L9 26 L16 20 M9 10 L5 5 L3 6 L5 15"/>
    </g>
    <text class="name" x="24" y="365">Space Shuttle</text><text class="note" x="24" y="397">ORBITAL GLIDER</text>
  </g>
  <g transform="translate(800 140)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M31 15 A5 5 0 1 1 21 15 A5 5 0 1 1 31 15 M21 11 L15 9 L10 11 L10 19 L15 21 L21 19 M10 15 H5"/><path d="M15 9 V3 M15 21 V27 M12 3 H18 M12 27 H18"/>
    </g>
    <text class="name" x="24" y="365">Soyuz</text><text class="note" x="24" y="397">CLASSIC CAPSULE</text>
  </g>
  <g transform="translate(40 630)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M35 15 Q31 10 25 10 H9 V20 H25 Q31 20 35 15 Z"/><path d="M13 10 L6 5 H3 L7 12 M13 20 L6 25 H3 L7 18 M9 12 V18"/>
    </g>
    <text class="name" x="24" y="365">Starship</text><text class="note" x="24" y="397">STAINLESS GIANT</text>
  </g>
  <g transform="translate(420 630)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M34 15 Q30 8 23 8 L18 11 V19 L23 22 Q30 22 34 15 Z M18 10 H7 V20 H18"/><path d="M10 10 V20 M14 10 V20 M7 15 H3"/>
    </g>
    <text class="name" x="24" y="365">SpaceX Dragon</text><text class="note" x="24" y="397">CREW CAPSULE</text>
  </g>
  <g transform="translate(800 630)">
    <rect class="card" width="360" height="450" rx="14"/>
    <g class="ship" transform="translate(92 82) scale(4.4)">
      <path d="M34 15 L25 10 L12 10 L5 15 L12 20 L25 20 Z"/><path d="M20 10 L15 4 M20 20 L15 26 M9 15 H3"/>
    </g>
    <text class="name" x="24" y="365">Default</text><text class="note" x="24" y="397">MOON NEEDLE</text>
  </g>
</svg>
