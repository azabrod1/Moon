<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#060912"/><stop offset="1" stop-color="#151124"/></linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#211b31"/><stop offset="1" stop-color="#0e101a"/></linearGradient>
    <filter id="glow2" x="-45%" y="-45%" width="190%" height="190%"><feGaussianBlur stdDeviation="3.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .eyebrow{font:600 14px ui-monospace,SFMono-Regular,monospace;letter-spacing:3px;fill:#ba8ee9}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f5f0fa}.sub{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#a094b1}.name{font:650 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f5f0fa}.note{font:500 11px ui-monospace,SFMono-Regular,monospace;letter-spacing:.8px;fill:#a48db5}.ship{fill:#c5a8e3;fill-opacity:.12;stroke:#e0c5ff;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow2)}.card{fill:url(#card2);stroke:#49355e;stroke-width:1}
    </style>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg2)"/><circle cx="155" cy="1015" r="340" fill="#512b77" opacity=".12"/>
