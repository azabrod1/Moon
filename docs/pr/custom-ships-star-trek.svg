<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#050d10"/><stop offset="1" stop-color="#0e2626"/></linearGradient><linearGradient id="card" y2="1"><stop stop-color="#15302f"/><stop offset="1" stop-color="#091817"/></linearGradient><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.eyebrow{font:600 14px ui-monospace,SFMono-Regular,monospace;letter-spacing:3px;fill:#76d9cc}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f1faf8}.sub{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#91b5af}.name{font:650 23px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f1faf8}.note{font:500 13px ui-monospace,SFMono-Regular,monospace;letter-spacing:1px;fill:#83b7ae}.card{fill:url(#card);stroke:#2d5650}.ship{fill:#a7dfd5;fill-opacity:.13;stroke:#bafff1;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}</style>
    <symbol id="enterprise" viewBox="0 0 40 30"><ellipse cx="29" cy="15" rx="8" ry="6"/><path d="M21 15 H16 L12 11 V19 L16 15 M13 11 L9 7 M13 19 L9 23 M10 5 H2 V9 H10 Q12 7 10 5 Z M10 21 H2 V25 H10 Q12 23 10 21 Z M24 11 Q29 8 34 11 M24 19 Q29 22 34 19"/></symbol>
    <symbol id="voyager" viewBox="0 0 40 30"><path d="M37 15 Q33 9 25 7 Q17 7 11 11 L8 15 L11 19 Q17 23 25 23 Q33 21 37 15 Z"/><path d="M12 11 L8 7 H2 V10 H9 M12 19 L8 23 H2 V20 H9 M13 15 H5 M17 10 L13 6 M17 20 L13 24 M25 9 Q30 10 33 13"/></symbol>
    <symbol id="klingon" viewBox="0 0 40 30"><path d="M37 15 L31 11 L23 13 L12 5 L4 6 L12 15 L4 24 L12 25 L23 17 L31 19 Z"/><path d="M23 13 L15 15 L23 17 M12 5 L8 2 M12 25 L8 28 M14 8 L9 15 L14 22 M29 12 V18"/></symbol>
    <symbol id="romulan" viewBox="0 0 40 30"><path d="M37 15 L32 12 H25 L22 14 V16 H25 L32 18 Z M23 14 L18 7 L8 3 L3 6 L10 14 Z M23 16 L10 16 L3 24 L8 27 L18 23 Z"/><path d="M24 12 L15 9 L9 6 M24 18 L15 21 L9 24 M22 14 H12 M22 16 H12 M18 8 L13 14 M18 22 L13 16"/></symbol>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/><circle cx="1070" cy="40" r="250" fill="#287166" opacity=".11"/>
  <text class="eyebrow" x="40" y="42">CHOOSE SHIP · STAR TREK</text><text class="title" x="40" y="82">Federation explorers and rival warbirds</text><text class="sub" x="40" y="108">Heading-aligned pastel slit-scan stars replace the Star Wars tunnel.</text>
  <g transform="translate(40 140)"><rect class="card" width="550" height="450" rx="16"/><use class="ship" href="#enterprise" x="145" y="75" width="260" height="210"/><text class="name" x="28" y="365">USS Enterprise</text><text class="note" x="28" y="400">FEDERATION EXPLORER</text></g>
  <g transform="translate(610 140)"><rect class="card" width="550" height="450" rx="16"/><use class="ship" href="#voyager" x="145" y="75" width="260" height="210"/><text class="name" x="28" y="365">USS Voyager</text><text class="note" x="28" y="400">INTREPID-CLASS EXPLORER</text></g>
  <g transform="translate(40 630)"><rect class="card" width="550" height="450" rx="16"/><use class="ship" href="#klingon" x="145" y="75" width="260" height="210"/><text class="name" x="28" y="365">Klingon Bird-of-Prey</text><text class="note" x="28" y="400">KLINGON RAIDER</text></g>
  <g transform="translate(610 630)"><rect class="card" width="550" height="450" rx="16"/><use class="ship" href="#romulan" x="145" y="75" width="260" height="210"/><text class="name" x="28" y="365">Romulan Warbird</text><text class="note" x="28" y="400">D’DERIDEX-CLASS WARBIRD</text></g>
</svg>
