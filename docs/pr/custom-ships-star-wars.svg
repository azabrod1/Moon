    <symbol id="tie" viewBox="0 0 40 30"><path d="M8 3 L4 8 V22 L8 27 H12 V3 Z M28 3 V27 H32 L36 22 V8 L32 3 Z"/><circle cx="20" cy="15" r="6"/><path d="M12 15 H14 M26 15 H28 M20 9 V21 M15 12 L25 18 M25 12 L15 18 M8 3 V27 M32 3 V27"/></symbol>
    <symbol id="destroyer" viewBox="0 0 40 30"><path d="M37 15 L4 3 L9 15 L4 27 Z"/><path d="M10 15 H33 M9 10 L28 15 L9 20 M12 12 H22 L19 9 H13 M12 18 H22 L19 21 H13 M14 13 V17 M18 13 V17"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="18" r="1"/></symbol>
    <symbol id="naboo" viewBox="0 0 40 30"><path d="M37 15 L24 11 H16 L10 15 L16 19 H24 Z"/><path d="M25 11 H14 Q11 8 14 6 H27 Q30 8 27 10 M25 19 H14 Q11 22 14 24 H27 Q30 22 27 20 M14 6 H5 M14 24 H5 M10 15 H3 M8 6 H2 M8 24 H2"/><circle cx="21" cy="15" r="2"/></symbol>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/><circle cx="150" cy="1080" r="330" fill="#5a2b80" opacity=".1"/>
  <text class="eyebrow" x="40" y="42">CHOOSE SHIP · STAR WARS</text><text class="title" x="40" y="82">Six unmistakable silhouettes</text><text class="sub" x="40" y="108">Every teleport uses a ship-centered blue hyperspace tunnel.</text>
  <g transform="translate(40 140)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#falcon" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">Millennium Falcon</text><text class="note" x="24" y="398">CORELLIAN FREIGHTER</text></g>
  <g transform="translate(420 140)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#xwing" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">X-wing</text><text class="note" x="24" y="398">REBEL STARFIGHTER</text></g>
  <g transform="translate(800 140)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#ywing" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">Y-wing</text><text class="note" x="24" y="398">REBEL BOMBER</text></g>
  <g transform="translate(40 630)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#tie" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">TIE Fighter</text><text class="note" x="24" y="398">IMPERIAL STARFIGHTER</text></g>
  <g transform="translate(420 630)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#destroyer" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">Star Destroyer</text><text class="note" x="24" y="398">IMPERIAL DESTROYER</text></g>
  <g transform="translate(800 630)"><rect class="card" width="360" height="450" rx="15"/><use class="ship" href="#naboo" x="85" y="90" width="190" height="160"/><text class="name" x="24" y="365">Naboo Starfighter</text><text class="note" x="24" y="398">ROYAL STARFIGHTER</text></g>
