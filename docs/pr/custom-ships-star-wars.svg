<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x2="1" y2="1"><stop stop-color="#080912"/><stop offset="1" stop-color="#181326"/></linearGradient><linearGradient id="card" y2="1"><stop stop-color="#211b32"/><stop offset="1" stop-color="#0e101a"/></linearGradient><filter id="glow" x="-35%" y="-35%" width="170%" height="170%"><feGaussianBlur stdDeviation="3.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.eyebrow{font:600 14px ui-monospace,SFMono-Regular,monospace;letter-spacing:3px;fill:#c598ed}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f7f2fb}.sub{font:400 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#aa9cb7}.name{font:650 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8f2fb}.note{font:500 12px ui-monospace,SFMono-Regular,monospace;letter-spacing:.9px;fill:#aa91bc}.card{fill:url(#card);stroke:#4b3860}.ship{fill:#d0b1e9;fill-opacity:.13;stroke:#e6cbff;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;filter:url(#glow)}</style>
    <symbol id="falcon" viewBox="0 0 40 30"><path d="M35 8 L25 11 A11 11 0 1 0 25 19 L35 22 L31 17 H20 V13 H31 Z"/><path d="M20 13 L15 6 M20 17 L15 24 M13 15 H5 M24 20 L28 25 H33 Q35 23 33 21 M12 10 A6 6 0 0 0 12 20 M17 9 L20 5"/></symbol>
    <symbol id="xwing" viewBox="0 0 40 30"><path d="M36 15 L25 12 H13 L6 15 L13 18 H25 Z"/><path d="M24 12 L13 4 H8 L17 12 M24 18 L13 26 H8 L17 18 M21 12 L12 7 H7 M21 18 L12 23 H7 M12 4 L3 2 M12 7 L3 5 M12 26 L3 28 M12 23 L3 25"/></symbol>
